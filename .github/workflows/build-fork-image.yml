name: Build fork Docker image

on:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
      - ".github/workflows/sync-upstream.yml"
  workflow_dispatch:

jobs:
  build:
    if: github.repository != 'plausible/analytics'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version metadata
        id: meta
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "sha_short=$SHA_SHORT" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/plausble-analytics:latest
            ghcr.io/${{ github.repository_owner }}/plausble-analytics:${{ steps.meta.outputs.sha_short }}
            ghcr.io/${{ github.repository_owner }}/plausble-analytics:${{ steps.meta.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Docker Image Built" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/${{ github.repository_owner }}/plausble-analytics:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/${{ github.repository_owner }}/plausble-analytics:${{ steps.meta.outputs.sha_short }}\`" >> $GITHUB_STEP_SUMMARY
