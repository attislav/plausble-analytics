# Nginx configuration for Plausible Analytics GitHub Webhook
# Add this to your existing stats.tripleadigital.de nginx config
# or create a separate config file in /etc/nginx/sites-available/

# Add this location block to your existing server block for stats.tripleadigital.de

location /github-webhook {
    # Only allow GitHub's IP ranges (optional but recommended)
    # Update these IPs regularly from: https://api.github.com/meta
    # For now, we'll allow all IPs and rely on the HMAC signature verification
    # allow 140.82.112.0/20;
    # allow 143.55.64.0/20;
    # allow 185.199.108.0/22;
    # allow 192.30.252.0/22;
    # allow 2a0a:a440::/29;
    # allow 2606:50c0::/32;
    # deny all;

    # Proxy to webhook server running on localhost:9000
    proxy_pass http://127.0.0.1:9000/webhook;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Preserve GitHub headers
    proxy_pass_request_headers on;

    # Timeouts
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # No buffering needed for webhook
    proxy_buffering off;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
}

